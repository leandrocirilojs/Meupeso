<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>NutriTrack Pro</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>

</head>

<body>

<header>

<h1>NutriTrack</h1>

<div id="levelBox">
Nivel <span id="userLevel">1</span> • XP <span id="userXP">0</span>
</div>

</header>

<section id="dashboard">

<div class="card">

<h3>Calorias Hoje</h3>

<div id="caloriesToday">0</div>

</div>

<div class="card">

<h3>Previsão de Emagrecimento</h3>

<div id="forecast"></div>

</div>

<div class="card">

<h3>Sugestão de Refeição</h3>

<div id="suggestMeal"></div>

</div>

</section>

<section id="foods">

<input id="foodSearch" placeholder="Buscar alimento">

<button onclick="searchFood()">Buscar</button>

<button onclick="startScanner()">Escanear</button>

<div id="scanner"></div>

<div id="foodResults"></div>

</section>

<section id="log">

<h2>Registro de hoje</h2>

<div id="todayLog"></div>

</section>

<section>

<canvas id="chartCalories"></canvas>

</section>

<script src="foods.js"></script>
<script src="app.js"></script>

</body>
</html>
